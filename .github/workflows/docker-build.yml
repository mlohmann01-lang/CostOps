name: docker-build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if find . -maxdepth 3 -iname 'Dockerfile*' | grep -q .; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker build
        if: steps.detect.outputs.has_dockerfile == 'true'
        run: |
          dockerfile_path=$(find . -maxdepth 3 -iname 'Dockerfile*' | head -n 1)
          context_dir=$(dirname "$dockerfile_path")
          docker build -f "$dockerfile_path" "$context_dir"

      - name: Docker not required for this repo
        if: steps.detect.outputs.has_dockerfile != 'true'
        run: echo "No Dockerfile present; docker-build check intentionally passes as no-op."
