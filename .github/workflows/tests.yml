name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test contoso scenario
        run: pnpm --filter @workspace/api-server run test:contoso

      - name: Test operationalization
        run: pnpm --filter @workspace/api-server run test:operationalization

      - name: Test platform boundaries
        run: pnpm --filter @workspace/api-server run test:platform-boundaries
