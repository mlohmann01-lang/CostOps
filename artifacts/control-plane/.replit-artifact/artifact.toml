kind = "web"
previewPath = "/"
title = "AI Outcome Control Plane"
version = "1.0.0"
id = "artifacts/control-plane"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24565

[services.development]
run = "pnpm --filter @workspace/control-plane run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/control-plane", "run", "build" ]
publicDir = "artifacts/control-plane/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24565"
BASE_PATH = "/"
