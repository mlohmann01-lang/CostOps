apiVersion: apps/v1
kind: Deployment
metadata: { name: govops-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: govops-api } }
  template:
    metadata: { labels: { app: govops-api } }
    spec:
      containers:
        - name: api
          image: govops:latest
          ports: [{ containerPort: 3000 }]
          readinessProbe: { httpGet: { path: /readiness, port: 3000 } }
          livenessProbe: { httpGet: { path: /health, port: 3000 } }
